name: .NET 8 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        shell: pwsh
        run: |
          # Use PowerShell on Windows runners. Restore solution if present, otherwise restore each project.
          $sln = Get-ChildItem -Path . -Filter '*.sln' -Name -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($sln) {
            dotnet restore $sln
          } else {
            $slnx = Get-ChildItem -Path . -Filter '*.slnx' -Name -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($slnx) {
              dotnet restore $slnx
            } else {
              Get-ChildItem -Recurse -Filter '*.csproj' | ForEach-Object { dotnet restore $_.FullName }
            }
          }

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal
