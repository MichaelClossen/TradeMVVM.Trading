name: .NET 8 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: |
          set -e
          # If a solution file exists, restore it. If there is a non-standard .slnx use that.
          if ls *.sln 1>/dev/null 2>&1; then
            dotnet restore *.sln
          elif ls *.slnx 1>/dev/null 2>&1; then
            dotnet restore *.slnx
          else
            # No solution file found: restore each project individually to avoid MSB1011
            find . -name '*.csproj' -print0 | xargs -0 -n1 dotnet restore
          fi

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal
